<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projects – Team Task Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/dashboard">TaskManager</a>
    <div class="d-flex gap-3 align-items-center">
      <a href="/dashboard" class="text-white text-decoration-none">Dashboard</a>
      <a href="/tasks" class="text-white text-decoration-none">My Tasks</a>
      <span class="text-secondary" id="userName"></span>
      <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="mb-0">Projects</h4>
      <button class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#newProjectModal">+ New Project</button>
    </div>
    <div id="projectsGrid" class="row g-3">
      <div class="col-12 text-center text-muted py-5">Loading…</div>
    </div>
  </div>

  <!-- New Project Modal -->
  <div class="modal fade" id="newProjectModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">New Project</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="modalError" class="alert alert-danger d-none"></div>
          <div class="mb-3">
            <label class="form-label">Project Name *</label>
            <input type="text" id="projectName" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea id="projectDesc" class="form-control" rows="3"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-dark" id="createProjectBtn" onclick="createProject()">Create</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script>
    requireAuth();
    const user = getUser();
    if (user) document.getElementById('userName').textContent = user.name;

    async function loadProjects() {
      try {
        const projects = await apiFetch('/projects/');
        const grid = document.getElementById('projectsGrid');
        if (!projects.length) {
          grid.innerHTML = '<div class="col-12 text-center text-muted py-5">No projects yet. Create your first project!</div>';
          return;
        }
        grid.innerHTML = projects.map(p => `
          <div class="col-md-4">
            <div class="card project-card p-3" onclick="window.location.href='/project-detail?id=${p.id}'">
              <h6 class="fw-bold mb-1">${p.name}</h6>
              <p class="text-muted small mb-2">${p.description || 'No description'}</p>
              <div class="d-flex gap-3 text-muted small">
                <span>👥 ${p.member_count} member${p.member_count !== 1 ? 's' : ''}</span>
                <span>✅ ${p.task_count} task${p.task_count !== 1 ? 's' : ''}</span>
              </div>
            </div>
          </div>`).join('');
      } catch (err) {
        document.getElementById('projectsGrid').innerHTML = `<div class="col-12 alert alert-danger">${err.message}</div>`;
      }
    }

    async function createProject() {
      const name = document.getElementById('projectName').value.trim();
      if (!name) { showError('modalError', 'Project name is required'); return; }
      hideError('modalError');
      const btn = document.getElementById('createProjectBtn');
      btn.disabled = true; btn.textContent = 'Creating…';
      try {
        await apiFetch('/projects/', {
          method: 'POST',
          body: JSON.stringify({ name, description: document.getElementById('projectDesc').value }),
        });
        bootstrap.Modal.getInstance(document.getElementById('newProjectModal')).hide();
        document.getElementById('projectName').value = '';
        document.getElementById('projectDesc').value = '';
        loadProjects();
      } catch (err) {
        showError('modalError', err.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Create';
      }
    }

    loadProjects();
  </script>
</body>
</html>
