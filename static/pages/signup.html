<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up – Team Task Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh">
  <div class="card shadow" style="width:100%;max-width:420px">
    <div class="card-body p-4">
      <h3 class="card-title text-center mb-4">Create Account</h3>
      <div id="error" class="alert alert-danger d-none"></div>
      <form id="signupForm">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" id="name" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" required minlength="6">
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="confirm" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-dark w-100" id="submitBtn">Create Account</button>
      </form>
      <p class="text-center mt-3 mb-0">Already have an account? <a href="/login">Login</a></p>
    </div>
  </div>
  <script src="/static/js/api.js"></script>
  <script>
    if (localStorage.getItem('token')) window.location.href = '/dashboard';

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError('error');
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (password !== confirm) { showError('error', 'Passwords do not match'); return; }
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Creating…';
      try {
        const data = await apiFetch('/auth/signup', {
          method: 'POST',
          body: JSON.stringify({
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password,
          }),
        });
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (err) {
        showError('error', err.message);
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
